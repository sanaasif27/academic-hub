# =============================================================
#  Netlify configuration — Netlify reads this automatically.
#  It tells Netlify how to build the site and how to harden it.
# =============================================================

[build]
  command  = "pip install -r requirements.txt && python3 build.py"
  publish  = "_site"

[build.environment]
  PYTHON_VERSION = "3.11"

# Pretty URLs / redirects
[[redirects]]
  from = "/blog/*"
  to   = "/writing/:splat"
  status = 301

# ---- Security headers ----
# These are what make a static site genuinely hard to attack.
#
# Two policies on purpose: a STRICT one for the public site (real XSS
# protection — no inline/eval scripts, no third-party script hosts), and a
# RELAXED one ONLY for /admin, which the Decap editor genuinely needs.
# Netlify applies the most specific matching path, so the /admin block below
# overrides the global one for editor pages.
#
# RECOVERY: if /admin ever fails to load after a deploy, copy the /admin
# Content-Security-Policy value up into the global block as a stopgap.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), serial=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"

# Relaxed policy for the editor only (Decap loads from unpkg, talks to GitHub
# + Netlify, and uses workers — none of which the public pages need).
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; connect-src 'self' https://api.github.com https://api.netlify.com https://raw.githubusercontent.com https://avatars.githubusercontent.com; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'self'; form-action 'self'; frame-ancestors 'none'"

# Modest cache on the (non-fingerprinted) CSS/JS so edits propagate quickly.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=600"
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=600"
