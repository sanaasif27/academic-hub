name: "Sana Asif"
role: "Assistant Professor of English"
institution: "Xavier University, Patna"
tagline: "Gender, space, and memory in the literature of Partition."
intro: >
  I research and teach at the intersection of Partition studies, gender, and
  memory — with a particular focus on the spatial worlds of Partition fiction
  by Muslim women. This site is where I share my writing, the readings and
  handouts my students need, and teaching materials for colleagues.

